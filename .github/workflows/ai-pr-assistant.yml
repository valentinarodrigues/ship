name: AI PR Assistant

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  suggest:
    name: Generate AI suggestions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate suggestions and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import os, json, urllib.request, subprocess, sys

          token      = os.environ['GH_TOKEN']
          pr_number  = os.environ['PR_NUMBER']
          pr_title   = os.environ['PR_TITLE']
          pr_body    = os.environ.get('PR_BODY', '')
          repo       = os.environ['REPO']

          # ── Fetch the diff (cap at 4000 chars to stay within model limits) ──
          result = subprocess.run(
            ['gh', 'pr', 'diff', pr_number, '--patch'],
            capture_output=True, text=True
          )
          diff = result.stdout[:4000]

          if not diff.strip():
            print("No diff found — skipping.")
            sys.exit(0)

          # ── Call GitHub Models API ────────────────────────────────────────
          system_prompt = """You are SHIP (Streamlined Handoff Infrastructure Pipeline).
          Your job is to help developers write better PRs by analysing the diff and suggesting:

          1. A conventional commit message in the format: type(scope): description
             Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
             Use ! for breaking changes e.g. feat!: redesign auth API

          2. A concise PR description (3-5 bullet points max) covering:
             - What changed
             - Why it changed
             - Any notable side effects

          Be direct. No preamble. Format output in markdown."""

          user_message = f"""PR Title: {pr_title}

          Existing description:
          {pr_body or '(none)'}

          Diff:
          {diff}

          Give me: 1) the best conventional commit message, 2) an improved PR description."""

          payload = json.dumps({
            "model": "gpt-4o-mini",
            "messages": [
              {"role": "system", "content": system_prompt},
              {"role": "user",   "content": user_message},
            ],
            "max_tokens": 600,
            "temperature": 0.3,
          }).encode()

          req = urllib.request.Request(
            'https://models.inference.ai.azure.com/chat/completions',
            data=payload,
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
            }
          )

          try:
            with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
            print(f"GitHub Models API error {e.code}: {e.read().decode()}")
            sys.exit(1)

          suggestion = data['choices'][0]['message']['content']

          # ── Delete previous SHIP comment if it exists (avoid spam on push) ─
          list_req = urllib.request.Request(
            f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
          )
          with urllib.request.urlopen(list_req) as resp:
            comments = json.loads(resp.read())

          for c in comments:
            if '<!-- ship-ai-comment -->' in c.get('body', ''):
              del_req = urllib.request.Request(
                f'https://api.github.com/repos/{repo}/issues/comments/{c["id"]}',
                headers={'Authorization': f'Bearer {token}'},
                method='DELETE'
              )
              urllib.request.urlopen(del_req)

          # ── Post new comment ──────────────────────────────────────────────
          body = f"""<!-- ship-ai-comment -->
          ## SHIP Suggestions

          {suggestion}

          ---
          *Auto-generated by [SHIP](https://github.com/{repo}) on every push to this PR. Dismiss if not useful.*"""

          comment_req = urllib.request.Request(
            f'https://api.github.com/repos/{repo}/issues/{pr_number}/comments',
            data=json.dumps({"body": body}).encode(),
            headers={
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github+json',
            }
          )
          urllib.request.urlopen(comment_req)
          print("SHIP comment posted.")
          PYEOF
