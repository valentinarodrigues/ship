name: Deploy Copilot Extension

on:
  push:
    branches: [main]
    paths:
      - 'copilot-extension/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: copilot-extension/package.json

      - name: Install dependencies
        working-directory: copilot-extension
        run: npm install

      - name: Deploy via Railway CLI
        working-directory: copilot-extension
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service ship-copilot-extension --detach

      - name: Print deployment URL
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deployed. Get your public URL from:"
          echo "https://railway.app/dashboard → ship-copilot-extension → Settings → Domains"
